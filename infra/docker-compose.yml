version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trafficcounter
      POSTGRES_USER: tc
      POSTGRES_PASSWORD: tc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tc -d trafficcounter"]
      interval: 5s
      timeout: 5s
      retries: 10

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"   # RTSP
      - "8889:8889"   # WebRTC HTTP
      - "8890:8890"   # WebRTC UDP
      - "9997:9997"   # REST API
    volumes:
      - ../mediamtx/mediamtx.yml:/mediamtx.yml

  backend:
    build:
      context: ../backend/TrafficCounter.Api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=trafficcounter;Username=tc;Password=tc"
      Security__BackendApiKey: "${BACKEND_API_KEY:-CHANGE_ME}"
      Security__EnforceHashChain: "false"
      MediaMtx__ApiBaseUrl: "http://mediamtx:9997"
      MediaMtx__RtspBaseUrl: "rtsp://mediamtx:8554"
      VisionWorker__BaseUrl: "http://vision-worker:8000"
      Cors__AllowedOrigins__0: "http://localhost:5173"
      Cors__AllowedOrigins__1: "http://localhost:3000"
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      postgres:
        condition: service_healthy
      mediamtx:
        condition: service_started

  vision-worker:
    build:
      context: ../vision-worker
    environment:
      BACKEND_URL: "http://backend:8080"
      BACKEND_API_KEY: "${BACKEND_API_KEY:-CHANGE_ME}"
      MEDIAMTX_RTSP_URL: "rtsp://mediamtx:8554"
    depends_on:
      - backend
      - mediamtx

  frontend:
    build:
      context: ../frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://localhost:8080"
      VITE_SIGNALR_URL: "http://localhost:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
