logLevel: info
logDestinations: [stdout]

api: true
apiAddress: :9997
apiAllowOrigins: ['*']

hls: true
hlsAddress: :8888
hlsAllowOrigins: ['*']
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

webrtc: true
webrtcAddress: :8889
webrtcAllowOrigins: ['*']
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: ''
webrtcIPsFromInterfaces: true
webrtcAdditionalHosts: [127.0.0.1, localhost]

pathDefaults:
  record: false

paths:
  ~^raw/.+$:
    source: publisher
  ~^processed/.+$:
    source: publisher
