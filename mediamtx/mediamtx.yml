###############################################
# MediaMTX configuration for TrafficCounter MVP
###############################################

# Log level
logLevel: info

# API REST (for backend path management)
api: yes
apiAddress: :9997

# RTSP server
rtspAddress: :8554
rtspEncryption: no

# WebRTC (browser delivery)
webrtcAddress: :8889
webrtcAdditionalHosts: []

# HLS (fallback)
hlsAddress: :8888

# Recording — paths can override this
record: no

# Default path settings (can be overridden per path below)
pathDefaults:
  # Allow any publisher (vision worker will publish to /processed/*)
  publishUser: ""
  publishPass: ""
  readUser: ""
  readPass: ""

  # Record raw and processed streams to /recordings/
  record: no
  recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordSegmentDuration: 1m

# Named paths can be added dynamically via the REST API
# The backend will call POST /v3/config/paths/add/{name}
paths:
  # Leave empty — paths are managed dynamically by the backend
  ~.*:
    record: no
